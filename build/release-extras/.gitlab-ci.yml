# GitLab Pages for the unzipped release bundle (site files at repo root).
# Push this bundle to a GitLab repo and Pages publishes it as-is — no build.
pages:
  stage: deploy
  image: alpine:latest
  script:
    - mkdir .public
    - cp -r * .public/
    - mv .public public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
