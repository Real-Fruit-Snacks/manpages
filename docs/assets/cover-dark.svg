<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" role="img" aria-label="manpages — offline linux manual">
  <style>text { font-family: ui-monospace, "JetBrains Mono", "Cascadia Code", Consolas, Menlo, monospace; }</style>
  <!-- resident ghost, peeking out from behind the terminal -->
  <g transform="translate(84,150) scale(2.8)">
    <path d="M2 16 V7 Q2 1 8 1 Q14 1 14 7 V16 L12 14.4 L10 16 L8 14.4 L6 16 L4 14.4 Z" fill="#63f2ab"/>
    <rect x="5" y="6" width="2" height="3" fill="#0e1214"/>
    <rect x="9" y="6" width="2" height="3" fill="#0e1214"/>
  </g>
  <!-- terminal window -->
  <rect x="110" y="18" width="600" height="234" rx="12" fill="#0e1214" stroke="#2a363d" stroke-width="1.5"/>
  <line x1="110" y1="52" x2="710" y2="52" stroke="#2a363d" stroke-width="1"/>
  <circle cx="138" cy="35" r="5.5" fill="#ff5f57"/>
  <circle cx="158" cy="35" r="5.5" fill="#febc2e"/>
  <circle cx="178" cy="35" r="5.5" fill="#28c840"/>
  <text x="410" y="40" text-anchor="middle" font-size="12" fill="#63736f">man — offline linux manual</text>
  <!-- brand -->
  <text x="410" y="126" text-anchor="middle" font-size="48" font-weight="700" fill="#dce4df">man<tspan fill="#63f2ab">pages</tspan></text>
  <!-- prompt -->
  <text x="180" y="172" font-size="15" fill="#63f2ab">❯ <tspan fill="#dce4df">man rsync</tspan><tspan fill="#63f2ab">▏</tspan></text>
  <!-- man page header -->
  <text x="180" y="202" font-size="13"><tspan fill="#dce4df" font-weight="700">RSYNC(1)</tspan><tspan fill="#879994">          User Commands          </tspan><tspan fill="#dce4df" font-weight="700">RSYNC(1)</tspan></text>
  <text x="180" y="226" font-size="13"><tspan fill="#6bdcff" font-weight="700">NAME</tspan><tspan fill="#879994">   rsync — fast, versatile file copying tool</tspan></text>
  <!-- tagline -->
  <text x="410" y="286" text-anchor="middle" font-size="13" fill="#879994">58,464 pre-rendered ubuntu man pages · fully static · zero network calls</text>
</svg>
