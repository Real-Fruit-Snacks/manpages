<!DOCTYPE html>
<html lang="en" data-root="./">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#090c0d" media="(prefers-color-scheme: dark)">
<meta name="theme-color" content="#f5f7f4" media="(prefers-color-scheme: light)">
<title>manpages — offline linux manual</title>
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="icon" href="favicon.ico" sizes="32x32">
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="assets/tokens.css">
<link rel="stylesheet" href="assets/app.css">
<link rel="stylesheet" href="assets/pet.css">
<script>try{var t=localStorage.getItem('twb-theme');if(t)document.documentElement.setAttribute('data-theme',t);var pm=localStorage.getItem('twb-pet');if(pm!=='cursor')document.documentElement.setAttribute('data-pet',pm==='off'?'off':'float');var ps=parseInt(localStorage.getItem('twb-pet-size'),10);if(ps>=16&&ps<=64)document.documentElement.style.setProperty('--pet-size',ps+'px');var po=parseInt(localStorage.getItem('twb-pet-opacity'),10);if(po>=15&&po<=100)document.documentElement.style.setProperty('--pet-base-opacity',(po/100).toFixed(3));}catch(e){}</script>
</head>
<body class="home">
<button id="theme-toggle" type="button" title="toggle theme">◐</button>
<main class="hero">
  <h1 class="hero-title">man<span class="brand-accent">pages</span></h1>
  <div class="search-wrap hero-search">
    <span class="prompt-char">❯</span>
    <input id="search" type="search" role="combobox" aria-expanded="false" aria-controls="results" aria-autocomplete="list" aria-label="Search man pages" placeholder="search man pages" autocomplete="off" spellcheck="false" autofocus>
    <ul id="results" role="listbox" aria-label="Search results" hidden></ul>
  </div>
  <p class="hints"><kbd>/</kbd> focus · <kbd>↑</kbd><kbd>↓</kbd> navigate · <kbd>Enter</kbd> open · <kbd>Esc</kbd> clear · <a href="browse/index.html">browse</a> · <a href="about.html">about</a></p>
  <p id="recent" class="recent" hidden></p>
</main>
<script src="data/index.js" defer></script>
<script src="assets/search-core.js" defer></script>
<script src="assets/app.js" defer></script>
<script src="assets/pet.js" defer></script>
<script>if('serviceWorker' in navigator && /^https?:$/.test(location.protocol)){navigator.serviceWorker.register('sw.js');}</script>
</body>
</html>
